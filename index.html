<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Sage — SailPoint SE Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Warm the TLS connection to the answer proxy early. Apps Script serves
         from script.google.com and 302-redirects the response through
         script.googleusercontent.com, so preconnect both — this shaves the
         handshake off the first overheard question. -->
    <link rel="preconnect" href="https://script.google.com" crossorigin>
    <link rel="preconnect" href="https://script.googleusercontent.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>

      :root {
        /* Brand design tokens (SailPoint) */
        --navy: #1F289C;
        --navy-deep: #161F5B;
        --primary: #0372FF;
        --primary-hover: #0262DB;
        --primary-press: #014BAC;
        --cyan: #31D1FF;
        --cyan-hi: #7FE3FF;
        --dark: #161F5B;
        --gray: #4D5878;
        --muted-blue: #AAB6E8;
        --quote: #F0F6FF;
        --divider: #DCE2EC;
        --n25: #FBFCFE;
        --n50: #F5F7FB;
        --n100: #EDF0F7;
        --n200: #DCE2EC;
        --n300: #C3CBDC;
        --n400: #97A2BB;
        --n500: #6B7693;
        --n600: #4D5878;
        --brand-green: #0F7A3F;
        --radius: 16px;
        --radius-sm: 10px;
        --shadow-card: 0 2px 6px rgba(22,31,91,0.08);
        --shadow-hover: 0 8px 24px rgba(22,31,91,0.10);
        --shadow-brand: 0 8px 24px rgba(3,114,255,0.22);
        --focus-ring: 0 0 0 4px rgba(3,114,255,0.25);
        --ease: cubic-bezier(.16,1,.3,1);
      }
      html, body { height: 100%; background: var(--n50); color: var(--dark); font-family: 'DM Sans', system-ui, sans-serif; }
      body { margin: 0; overflow: hidden; }
      #app { height: 100dvh; }
      * { scrollbar-width: thin; scrollbar-color: var(--n300) transparent; }
      *::-webkit-scrollbar { width: 8px; height: 8px; }
      *::-webkit-scrollbar-thumb { background: var(--n300); border-radius: 4px; }
      *::-webkit-scrollbar-track { background: transparent; }

      button { font-family: inherit; }
      :is(button, [role="button"], [role="switch"]):focus-visible { outline: none; box-shadow: var(--focus-ring); }

      /* ===== Base form fields (settings) ===== */
      input[type="text"], input[type="password"], textarea {
        width: 100%; padding: 10px 14px; border: 1.5px solid var(--n200); border-radius: var(--radius-sm);
        font-size: 14px; font-weight: 500; color: var(--navy-deep); background: #fff; outline: none;
        transition: border-color 0.2s, box-shadow 0.2s; font-family: inherit;
      }
      input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(3,114,255,0.12); }
      textarea { resize: vertical; min-height: 80px; }

      .btn-primary { display: inline-flex; align-items: center; gap: 6px; background: var(--primary); color: #fff; border: none; border-radius: 999px; padding: 10px 22px; min-height: 42px; font-weight: 600; font-size: 13px; cursor: pointer; transition: background 0.12s; }
      .btn-primary:hover { background: var(--primary-hover); }
      .btn-primary:active { background: var(--primary-press); }
      .btn-outline { display: inline-flex; align-items: center; gap: 6px; background: transparent; color: var(--navy-deep); border: 1.5px solid var(--n300); border-radius: 999px; padding: 9px 20px; min-height: 42px; font-weight: 600; font-size: 13px; cursor: pointer; transition: border-color 0.12s, color 0.12s; }
      .btn-outline:hover { color: var(--primary); border-color: var(--primary); }
      .btn-danger { display: inline-flex; align-items: center; gap: 6px; background: transparent; color: #dc2626; border: 1.5px solid #fca5a5; border-radius: 999px; padding: 9px 20px; min-height: 42px; font-weight: 600; font-size: 13px; cursor: pointer; transition: background 0.12s, color 0.12s; }
      .btn-danger:hover { background: #dc2626; border-color: #dc2626; color: #fff; }

      /* ================================================================
       * APP SHELL — sidebar + main column
       * ================================================================ */
      .app-frame { display: flex; height: 100dvh; overflow: hidden; }
      .main-col { flex: 1; min-width: 0; display: flex; flex-direction: column; background: #fff; }

      /* ===== Sidebar (brand navy) ===== */
      .sidebar { width: 296px; flex-shrink: 0; display: flex; flex-direction: column; background: var(--navy); color: #fff; }
      .sidebar * { scrollbar-color: rgba(255,255,255,0.25) transparent; }
      .sidebar *::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); }

      .sb-brand { display: flex; align-items: baseline; gap: 10px; padding: 20px 18px 14px; }
      .sb-logo { font-size: 21px; font-weight: 700; letter-spacing: -0.025em; line-height: 1; color: #fff; }
      .sb-logo .lg-re { color: var(--cyan); }
      .sb-tagline { font-size: 10.5px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-blue); }
      .sb-close { display: none; margin-left: auto; background: transparent; border: none; color: var(--muted-blue); cursor: pointer; padding: 6px; border-radius: 8px; }
      .sb-close:hover { color: #fff; background: rgba(255,255,255,0.10); }

      .sb-new { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 2px 14px 12px; padding: 11px 16px; background: #fff; color: var(--navy); border: none; border-radius: 999px; font-size: 13.5px; font-weight: 700; cursor: pointer; transition: background 0.12s, transform 0.12s; }
      .sb-new:hover { background: var(--quote); }
      .sb-new:active { transform: scale(0.98); }

      .sb-search { position: relative; display: flex; align-items: center; margin: 0 14px 12px; flex-shrink: 0; }
      .sb-search-ic { position: absolute; left: 12px; color: var(--muted-blue); pointer-events: none; }
      .sb-search input[type="text"] { width: 100%; padding: 9px 32px 9px 34px; border: 1px solid rgba(255,255,255,0.18); border-radius: 999px; font-size: 12.5px; font-weight: 500; color: #fff; background: rgba(255,255,255,0.08); }
      .sb-search input[type="text"]::placeholder { color: var(--muted-blue); }
      .sb-search input[type="text"]:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(49,209,255,0.20); background: rgba(255,255,255,0.12); }
      .sb-search-clear { position: absolute; right: 8px; background: rgba(255,255,255,0.14); border: none; border-radius: 50%; width: 20px; height: 20px; display: grid; place-items: center; color: #fff; cursor: pointer; transition: background 0.12s; }
      .sb-search-clear:hover { background: rgba(255,255,255,0.28); }

      .sb-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-blue); padding: 4px 20px 6px; }
      .sb-list { flex: 1; min-height: 0; overflow-y: auto; padding: 0 10px 12px; display: flex; flex-direction: column; gap: 2px; }
      .sb-empty { padding: 28px 14px; font-size: 12px; line-height: 1.7; color: var(--muted-blue); text-align: center; }
      .sb-group + .sb-group { margin-top: 12px; }
      .sb-group-head { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.45); padding: 6px 10px 4px; }

      .sb-item { position: relative; display: flex; gap: 8px; align-items: flex-start; padding: 9px 10px; border-radius: 10px; cursor: pointer; transition: background 0.12s; }
      .sb-item:hover { background: rgba(255,255,255,0.08); }
      .sb-item.active { background: rgba(255,255,255,0.14); }
      .sb-item:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--cyan); }
      .sb-item-body { flex: 1; min-width: 0; }
      .sb-item-title { font-size: 12.5px; font-weight: 500; color: #fff; line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
      .sb-item-meta { font-size: 10.5px; color: var(--muted-blue); margin-top: 3px; line-height: 1; }
      .sb-item-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.12s; flex-shrink: 0; }
      .sb-item:hover .sb-item-actions, .sb-item:focus-within .sb-item-actions { opacity: 1; }
      .sb-item-actions button { background: rgba(255,255,255,0.10); border: none; padding: 5px; min-width: 26px; min-height: 26px; display: grid; place-items: center; border-radius: 7px; color: rgba(255,255,255,0.75); cursor: pointer; transition: background 0.1s, color 0.1s; }
      .sb-item-actions button:hover { background: var(--primary); color: #fff; }
      .sb-item-actions button.danger:hover { background: #dc2626; color: #fff; }
      .sb-item.confirming { background: rgba(240,89,40,0.16); }
      .sb-confirm { display: flex; gap: 6px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
      .sb-confirm span { font-size: 11px; font-weight: 600; color: #FFC9A8; }
      .sb-confirm button { font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 999px; border: none; cursor: pointer; line-height: 1; min-height: 26px; }
      .sb-confirm .ok { background: #dc2626; color: #fff; }
      .sb-confirm .ok:hover { background: #b91c1c; }
      .sb-confirm .no { background: rgba(255,255,255,0.16); color: #fff; }
      .sb-confirm .no:hover { background: rgba(255,255,255,0.28); }

      .sb-foot { flex-shrink: 0; padding: 10px 14px 14px; border-top: 1px solid rgba(255,255,255,0.12); }
      .sb-foot-btn { display: flex; align-items: center; gap: 10px; width: 100%; background: transparent; border: none; color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 600; padding: 10px 10px; border-radius: 10px; cursor: pointer; transition: background 0.12s, color 0.12s; }
      .sb-foot-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
      .sb-foot-btn.active { background: rgba(255,255,255,0.14); color: #fff; }

      .sidebar-scrim { display: none; }

      /* ===== Chat header ===== */
      .chat-head { position: relative; display: flex; align-items: center; gap: 12px; padding: 10px 20px; min-height: 64px; border-bottom: 1px solid var(--divider); background: #fff; flex-shrink: 0; z-index: 10; }
      .head-titles { flex: 1; min-width: 0; }
      .conv-title { font-size: 15px; font-weight: 700; color: var(--navy-deep); letter-spacing: -0.01em; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .conv-sub { font-size: 11.5px; color: var(--n500); line-height: 1.4; }
      .head-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

      .icon-btn { background: transparent; border: none; cursor: pointer; padding: 8px; min-width: 38px; min-height: 38px; display: grid; place-items: center; border-radius: 10px; color: var(--n500); transition: background 0.12s, color 0.12s; }
      .icon-btn:hover { background: var(--n100); color: var(--navy-deep); }
      .icon-btn.active { background: var(--quote); color: var(--primary); }
      .icon-btn.danger:hover { background: #fef2f2; color: #dc2626; }
      .sb-toggle { display: none; }

      .chat-avatar { position: relative; width: 38px; height: 38px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 14px; flex-shrink: 0; background: var(--primary); }
      .chat-avatar .status-dot { position: absolute; bottom: 0; right: 0; width: 11px; height: 11px; border-radius: 50%; background: #10b981; border: 2px solid #fff; box-shadow: 0 0 0 0 rgba(16,185,129,0.55); animation: statusPulse 2.2s ease-out infinite; }
      .chat-avatar.muted .status-dot { background: var(--n400); animation: none; }
      @keyframes statusPulse {
        0%   { box-shadow: 0 0 0 0 rgba(16,185,129,0.55); }
        70%  { box-shadow: 0 0 0 8px rgba(16,185,129,0); }
        100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
      }

      /* Voice pill — single control for every voice state */
      .vp { display: inline-flex; align-items: center; gap: 8px; height: 40px; padding: 0 18px; border-radius: 999px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.12s, color 0.12s, box-shadow 0.12s; white-space: nowrap; }
      .vp:disabled { cursor: not-allowed; opacity: 0.55; }
      .vp.go { background: var(--primary); color: #fff; box-shadow: var(--shadow-brand); }
      .vp.go:hover { background: var(--primary-hover); }
      .vp.on { background: var(--quote); color: var(--navy); border: 1px solid rgba(3,114,255,0.25); }
      .vp.on:hover { background: #E2EEFF; }
      .vp.live { background: var(--primary); color: #fff; }
      .vp.live:hover { background: var(--primary-hover); }
      .vp.speak { background: var(--cyan); color: var(--navy-deep); }
      .vp.think { background: var(--n100); color: var(--n600); }
      .vp.off { background: var(--n100); color: var(--n500); }
      .vp .vp-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; flex-shrink: 0; box-shadow: 0 0 0 0 rgba(16,185,129,0.55); animation: statusPulse 1.8s ease-out infinite; }
      .vp.live .vp-dot { background: #fff; box-shadow: 0 0 0 0 rgba(255,255,255,0.55); }
      .vp-wave { height: 14px; gap: 2px; }
      .vp-wave .sound-wave-bar { width: 3px; }
      .vp-spin { animation: vpSpin 1s linear infinite; }
      @keyframes vpSpin { to { transform: rotate(360deg); } }

      /* Overflow menu */
      .overflow-menu { position: absolute; top: 58px; right: 16px; z-index: 40; background: #fff; border: 1px solid var(--n200); border-radius: 14px; box-shadow: var(--shadow-hover); min-width: 230px; padding: 6px; animation: menuIn 0.15s ease-out; }
      @keyframes menuIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
      .overflow-menu button { width: 100%; text-align: left; background: transparent; border: none; padding: 10px 12px; font-size: 13.5px; color: var(--navy-deep); display: flex; align-items: center; gap: 10px; border-radius: 9px; cursor: pointer; transition: background 0.12s; font-weight: 500; }
      .overflow-menu button:hover:not(:disabled) { background: var(--n50); }
      .overflow-menu button:disabled { opacity: 0.4; cursor: not-allowed; }
      .overflow-menu button i { color: var(--n500); }
      .overflow-menu hr { border: none; border-top: 1px solid var(--n100); margin: 4px 0; }
      .overflow-menu .danger { color: #dc2626; }
      .overflow-menu .danger i { color: #dc2626; }
      .menu-toggle-state { margin-left: auto; font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 999px; background: var(--n100); color: var(--n500); letter-spacing: 0.04em; }
      .menu-toggle-state.on { background: #d1fae5; color: #047857; }

      /* ===== Live listening strip ===== */
      .live-strip { display: flex; align-items: center; gap: 16px; padding: 10px 24px; background: linear-gradient(0deg, rgba(49,209,255,0.07), rgba(49,209,255,0.07)), #fff; border-bottom: 1px solid var(--divider); flex-shrink: 0; }
      .ls-wave { color: var(--primary); flex-shrink: 0; }
      .ls-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
      .ls-top { display: flex; align-items: baseline; gap: 10px; min-width: 0; }
      .ls-title { font-size: 12px; font-weight: 700; color: var(--navy); white-space: nowrap; }
      .ls-stats { font-size: 11px; color: var(--n500); white-space: nowrap; }
      .ls-stats.busy { color: var(--primary); font-weight: 600; }
      .ls-desktop { font-size: 10.5px; font-weight: 600; color: var(--n500); margin-top: 2px; }
      .ls-desktop.on { color: var(--primary); }
      .ls-live { display: flex; align-items: center; gap: 8px; min-width: 0; }
      .ls-live-text { font-size: 12px; color: var(--n600); line-height: 1.4; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      #live-transcript-text:empty::before { content: 'Waiting for speech…'; font-style: italic; color: var(--n400); }
      .ac-live .ac-cancel { display: none; background: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; border-radius: 999px; font-size: 10.5px; padding: 3px 11px; cursor: pointer; font-weight: 600; line-height: 1; flex-shrink: 0; }
      .ac-live.hearing .ac-cancel { display: inline-flex; }
      .ac-live .ac-cancel:hover { background: #dc2626; color: #fff; }
      .ls-last { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--n400); min-width: 0; }
      .ls-last span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .ls-last .ok { color: var(--brand-green); }
      .ls-last .skip { color: var(--n400); }
      .ls-nearmiss { display: inline-flex; align-items: center; gap: 6px; max-width: 100%; min-width: 0; font-size: 11px; font-weight: 600; color: var(--primary); background: var(--quote, #eef4ff); border: 1px solid color-mix(in srgb, var(--primary) 35%, transparent); border-radius: 999px; padding: 3px 11px; cursor: pointer; line-height: 1.2; text-align: left; }
      .ls-nearmiss span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .ls-nearmiss:hover { background: var(--primary); color: #fff; }
      .ls-nearmiss i { flex-shrink: 0; }
      .ls-controls { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
      .ls-speak { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: var(--n600); cursor: default; }
      .ls-off { background: transparent; border: 1.5px solid var(--n300); color: var(--n600); font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 999px; cursor: pointer; transition: border-color 0.12s, color 0.12s; }
      .ls-off:hover { border-color: #dc2626; color: #dc2626; }

      .interim-caret { display: inline-block; width: 6px; margin-left: 2px; animation: interim-blink 1s steps(2,end) infinite; color: var(--primary); }
      @keyframes interim-blink { 50% { opacity: 0; } }

      /* ===== Message area ===== */
      .msg-scroll { flex: 1 1 0; min-height: 0; min-width: 0; overflow-y: auto; background: var(--n25); }
      .msg-col { max-width: 768px; margin: 0 auto; padding: 28px 24px 16px; display: flex; flex-direction: column; gap: 16px; }
      .msg-row { display: flex; gap: 10px; align-items: flex-start; justify-content: flex-start; }
      .msg-row.me { justify-content: flex-end; }
      .msg-av { width: 28px; height: 28px; border-radius: 50%; background: var(--primary); color: #fff; font-weight: 700; font-size: 12px; display: grid; place-items: center; flex-shrink: 0; margin-top: 2px; }

      .chat-bubble { padding: 11px 16px; border-radius: 18px; font-size: 14px; line-height: 1.55; word-wrap: break-word; white-space: pre-wrap; }
      .chat-user { background: var(--primary); color: #fff; border-radius: 18px 18px 6px 18px; max-width: 70%; }
      .chat-bot { background: #fff; color: var(--dark); border: 1px solid var(--divider); border-radius: 6px 18px 18px 18px; box-shadow: var(--shadow-card); }
      .chat-bubble.typing { display: inline-flex; gap: 4px; padding: 14px 16px; }
      .msg-wrap { position: relative; max-width: 86%; }
      .msg-wrap .chat-bubble { max-width: 100%; }

      @keyframes dotPulse { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
      .typing-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--n400); display: inline-block; animation: dotPulse 1.4s infinite ease-in-out both; }
      .typing-dot:nth-child(1) { animation-delay: -0.32s; }
      .typing-dot:nth-child(2) { animation-delay: -0.16s; }

      /* Markdown answers */
      .chat-md { white-space: normal; }
      .chat-md p { margin: 0 0 8px; }
      .chat-md p:last-child { margin-bottom: 0; }
      .chat-md ul, .chat-md ol { margin: 4px 0 10px 4px; padding-left: 16px; }
      .chat-md ul { list-style: none; padding-left: 2px; }
      .chat-md ul li { position: relative; padding-left: 18px; margin-bottom: 6px; line-height: 1.55; }
      .chat-md ul li::before { content: ''; position: absolute; left: 2px; top: 8px; width: 7px; height: 7px; border-radius: 2px; background: var(--cyan); }
      .chat-md ol li { margin-bottom: 6px; line-height: 1.55; }
      .chat-md strong { color: var(--navy-deep); font-weight: 700; }
      .chat-md code { background: var(--n100); padding: 2px 5px; border-radius: 4px; font-size: 12.5px; }
      .chat-md a { color: var(--primary); text-decoration: underline; text-underline-offset: 3px; }
      .chat-md .md-h { font-size: 13px; font-weight: 700; color: var(--navy-deep); margin: 10px 0 6px; }
      .assist-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--primary); background: rgba(3,114,255,0.07); border: 1px solid rgba(3,114,255,0.16); border-radius: 6px; padding: 3px 8px; margin-bottom: 8px; }
      .src-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; padding-top: 8px; border-top: 1px dashed var(--n200); }
      .src-chips a { display: inline-flex; align-items: center; gap: 4px; font-size: 10.5px; font-weight: 600; color: var(--n600); background: var(--n50); border: 1px solid var(--n200); border-radius: 999px; padding: 3px 9px; text-decoration: none; transition: color 0.15s, border-color 0.15s, background 0.15s; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .src-chips a:hover { color: var(--primary); border-color: var(--cyan); background: var(--quote); }

      /* Per-message actions */
      .msg-copy { position: absolute; top: 6px; right: 6px; background: rgba(255,255,255,0.9); border: 1px solid var(--n200); color: var(--n500); padding: 4px; min-width: 26px; min-height: 26px; border-radius: 7px; cursor: pointer; display: grid; place-items: center; transition: opacity 0.12s, background 0.12s, color 0.12s, border-color 0.12s; opacity: 0; }
      .msg-wrap:hover .msg-copy, .msg-copy:focus-visible { opacity: 1; }
      .msg-copy:hover { background: #fff; color: var(--primary); border-color: var(--primary); }
      .msg-copy.copied { background: #ecfdf5; border-color: #6ee7b7; color: #047857; opacity: 1; }
      .tts-btn { position: absolute; bottom: 4px; right: 4px; background: transparent; border: none; cursor: pointer; padding: 6px; min-width: 28px; min-height: 28px; border-radius: 6px; color: var(--n400); transition: color 0.15s, background 0.15s; line-height: 0; }

      /* ===== Empty-state hero (voice orb) ===== */
      .hero { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 9vh 20px 24px; }

      .voice-orb { position: relative; z-index: 1; width: 108px; height: 108px; border-radius: 50%; border: none; cursor: pointer; display: grid; place-items: center; color: #fff; background: var(--primary); box-shadow: var(--shadow-brand); transition: transform .18s var(--ease), background .2s, box-shadow .2s, color .2s; }

      .voice-orb.listening { background: var(--primary); color: #fff; box-shadow: 0 0 0 7px rgba(49,209,255,.30), var(--shadow-brand); }
      .voice-orb.speaking { background: var(--cyan); color: var(--navy-deep); box-shadow: 0 14px 42px rgba(49,209,255,.45); }
      .voice-orb.thinking { background: var(--n100); color: var(--navy); box-shadow: inset 0 0 0 2px var(--n200); }
      .voice-orb.thinking .typing-dot { background: var(--navy); }
      .voice-orb .sound-wave { height: 30px; gap: 4px; }
      .voice-orb .sound-wave-bar { width: 5px; border-radius: 3px; }
      .voice-orb .orb-dots { display: inline-flex; gap: 6px; }
      .voice-orb:disabled { background: var(--n100); color: var(--n400); cursor: not-allowed; box-shadow: none; transform: none; }
      .hero-name { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; color: var(--navy-deep); margin-bottom: 6px; }
      .hero-sub { font-size: 13.5px; color: var(--gray); line-height: 1.6; max-width: 380px; margin-bottom: 16px; text-wrap: pretty; }
      .hero-status { display: inline-flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 600; color: var(--navy-deep); background: var(--n100); padding: 7px 16px; border-radius: 999px; }
      .hero-status .st-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--n400); flex-shrink: 0; }
      .hero-status.listening { background: var(--quote); color: var(--navy); }
      .hero-status.listening .st-dot { background: #10b981; animation: statusPulse 1.6s ease-out infinite; }
      .hero-status.speaking { background: rgba(49,209,255,0.14); }
      .hero-status.speaking .st-dot { background: var(--cyan); }

      .sound-wave { display: inline-flex; align-items: center; gap: 3px; height: 20px; }
      .sound-wave-bar { display: block; width: 4px; height: 100%; background: currentColor; border-radius: 2px; transform-origin: center; animation: soundWave 0.9s ease-in-out infinite; }
      .sound-wave-bar:nth-child(1) { animation-delay: -0.2s; }

      .sound-wave-bar:nth-child(3) { animation-delay: 0s; }
      @keyframes soundWave { 0%, 100% { transform: scaleY(0.3); } 50% { transform: scaleY(1); } }

      /* ===== Composer ===== */
      .composer-zone { flex-shrink: 0; background: var(--n25); padding: 8px 24px max(16px, env(safe-area-inset-bottom)); }
      .composer { display: flex; align-items: flex-end; gap: 10px; max-width: 768px; margin: 0 auto; background: #fff; border: 1.5px solid var(--n200); border-radius: 26px; padding: 8px 8px 8px 20px; box-shadow: var(--shadow-card); transition: border-color 0.15s, box-shadow 0.15s; }

      .comp-send { width: 38px; height: 38px; border-radius: 50%; background: var(--primary); color: #fff; border: none; display: grid; place-items: center; cursor: pointer; flex-shrink: 0; transition: background 0.12s, transform 0.12s; }

      .comp-send:disabled { background: var(--n200); color: #fff; cursor: not-allowed; }

      /* ===== Saved-conversation view (read-only, in place) ===== */
      .saved-view { display: flex; flex-direction: column; flex: 1; min-height: 0; }
      .saved-note { align-self: center; display: inline-flex; align-items: center; gap: 7px; font-size: 11.5px; font-weight: 600; color: var(--n500); background: var(--n100); border-radius: 999px; padding: 6px 14px; margin-bottom: 4px; }
      .popout-answer { position: relative; max-width: 86%; }
      .popout-answer .chat-bubble { max-width: 100%; padding-right: 38px; }
      .popout-copy { position: absolute; top: 6px; right: 6px; background: rgba(255,255,255,0.9); border: 1px solid var(--n200); color: var(--n500); padding: 4px; min-width: 26px; min-height: 26px; border-radius: 7px; cursor: pointer; display: grid; place-items: center; transition: opacity 0.12s, background 0.12s, color 0.12s, border-color 0.12s; opacity: 0; }
      .popout-answer:hover .popout-copy, .popout-copy:focus-visible { opacity: 1; }
      .popout-copy:hover { background: #fff; color: var(--primary); border-color: var(--primary); }
      .popout-copy.copied { background: #ecfdf5; border-color: #6ee7b7; color: #047857; opacity: 1; }
      .confirm-label { font-size: 12.5px; font-weight: 600; color: #b45309; }
      .btn-ghost { background: var(--n100); border: none; color: var(--navy-deep); font-size: 12.5px; font-weight: 600; padding: 9px 16px; border-radius: 999px; cursor: pointer; transition: background 0.12s; }
      .btn-ghost:hover { background: var(--n200); }
      .btn-danger-solid { background: #dc2626; border: none; color: #fff; font-size: 12.5px; font-weight: 600; padding: 9px 18px; border-radius: 999px; cursor: pointer; transition: background 0.12s; }
      .btn-danger-solid:hover { background: #b91c1c; }

      /* ===== Settings ===== */
      .settings-scroll { flex: 1; min-height: 0; overflow-y: auto; background: var(--n25); }
      .settings-col { max-width: 880px; margin: 0 auto; padding: 28px 24px 48px; }
      .settings-section { border: 1px solid var(--divider); border-radius: var(--radius); padding: 26px; background: #fff; box-shadow: var(--shadow-card); }
      .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 24px; }
      .settings-grid > .full { grid-column: 1 / -1; }

      /* ===== Toggle switch ===== */
      .voice-switch { position: relative; display: inline-flex; align-items: center; width: 44px; height: 24px; border-radius: 999px; background: var(--n300); cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
      .voice-switch.on { background: var(--primary); }
      .voice-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: left 0.2s; box-shadow: 0 1px 3px rgba(22,31,91,0.2); }
      .voice-switch.on::after { left: 22px; }
      .voice-switch.disabled { opacity: 0.45; cursor: not-allowed; }

      /* ===== Toast ===== */
      .voice-toast { position: fixed; bottom: 92px; left: 50%; transform: translateX(-50%); z-index: 100; background: var(--navy-deep); color: #fff; padding: 11px 18px; border-radius: 12px; font-size: 13px; font-weight: 500; box-shadow: 0 20px 48px rgba(22,31,91,0.30); pointer-events: none; animation: toastIn 0.25s ease-out; max-width: min(92vw, 480px); text-align: center; }
      @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }

      /* Visually hidden but available to screen readers (live region). */
      .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0; }

      /* ===== Audio-mode chooser ("How should Sage listen?") ===== */
      .ac-scrim, .ac-scrim * { box-sizing: border-box; }
      .ac-scrim { position: fixed; inset: 0; z-index: 120; display: grid; place-items: center; padding: 20px; background: rgba(22,31,91,0.42); backdrop-filter: blur(2px); animation: acFade 0.18s ease-out; }
      @keyframes acFade { from { opacity: 0; } to { opacity: 1; } }
      .ac-modal { position: relative; width: min(440px, 100%); background: #fff; border-radius: var(--radius); box-shadow: 0 24px 64px rgba(22,31,91,0.34); padding: 26px 24px 22px; animation: acPop 0.22s var(--ease); }
      @keyframes acPop { from { opacity: 0; transform: translateY(10px) scale(0.985); } to { opacity: 1; transform: translateY(0) scale(1); } }
      .ac-modal:focus { outline: none; }
      .ac-x { position: absolute; top: 13px; right: 13px; width: 32px; height: 32px; display: grid; place-items: center; border: none; background: transparent; color: var(--n500); border-radius: 8px; cursor: pointer; transition: background 0.12s, color 0.12s; }
      .ac-x:hover { background: var(--n100); color: var(--navy-deep); }
      .ac-title { font-size: 18px; font-weight: 700; color: var(--navy-deep); letter-spacing: -0.01em; padding-right: 28px; }
      .ac-sub { margin: 5px 0 18px; font-size: 13px; color: var(--n600); line-height: 1.45; }
      .ac-seg { position: relative; display: grid; grid-template-columns: 1fr 1fr; background: var(--n100); border-radius: 999px; padding: 4px; }
      .ac-seg-thumb { position: absolute; top: 4px; bottom: 4px; left: 4px; width: calc(50% - 4px); border-radius: 999px; background: var(--primary); box-shadow: var(--shadow-brand); transition: left 0.22s var(--ease); }
      .ac-seg.right .ac-seg-thumb { left: 50%; }
      .ac-seg-opt { position: relative; z-index: 1; background: transparent; border: none; padding: 11px 8px; font-size: 13.5px; font-weight: 600; color: var(--n600); cursor: pointer; border-radius: 999px; transition: color 0.18s; white-space: nowrap; }
      .ac-seg-opt.on { color: #fff; }
      .ac-desc { display: flex; gap: 12px; align-items: flex-start; margin: 16px 2px 22px; }
      .ac-desc-ic { flex-shrink: 0; width: 38px; height: 38px; border-radius: 10px; display: grid; place-items: center; background: var(--quote); color: var(--primary); }
      .ac-desc-sub { font-size: 11.5px; font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 3px; }
      .ac-desc-line { font-size: 13.5px; color: var(--navy-deep); line-height: 1.5; margin: 0; }
      .ac-go { width: 100%; display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: var(--primary); color: #fff; border: none; border-radius: 999px; padding: 13px 20px; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: var(--shadow-brand); transition: background 0.12s; }
      .ac-go:hover { background: var(--primary-hover); }
      .ac-go:active { background: var(--primary-press); }

      /* ===== Sidebar control group ("Options") ===== */
      .sb-controls { padding: 2px 10px 10px; display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
      .sb-controls .sb-label { padding: 4px 10px 6px; }
      .sb-ctl { display: flex; align-items: center; gap: 11px; width: 100%; background: transparent; border: none; color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 600; padding: 10px 10px; border-radius: 10px; cursor: pointer; transition: background 0.12s, color 0.12s; text-align: left; font-family: inherit; }
      .sb-ctl:hover:not(:disabled) { background: rgba(255,255,255,0.08); color: #fff; }
      .sb-ctl:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--cyan); }
      .sb-ctl:disabled { opacity: 0.4; cursor: not-allowed; }
      .sb-ctl i { flex-shrink: 0; color: rgba(255,255,255,0.65); transition: color 0.12s; }
      .sb-ctl:hover:not(:disabled) i { color: rgba(255,255,255,0.9); }
      .sb-ctl .sb-ctl-label { flex: 1; min-width: 0; }
      .sb-ctl.danger:hover:not(:disabled) { background: rgba(220,38,38,0.20); color: #fff; }
      .sb-ctl.danger:hover:not(:disabled) i { color: #fff; }
      .sb-switch { position: relative; width: 40px; height: 22px; border-radius: 999px; background: rgba(255,255,255,0.22); flex-shrink: 0; transition: background 0.2s; }
      .sb-switch.on { background: var(--cyan); }
      .sb-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: left 0.2s; box-shadow: 0 1px 2px rgba(22,31,91,0.25); }
      .sb-switch.on::after { left: 20px; }
      .sb-divider { height: 1px; background: rgba(255,255,255,0.12); margin: 8px 14px; flex-shrink: 0; }

      /* ================================================================
       * VOICE CONSOLE — the main stage: mic orb + live voice-to-text +
       * what Sage is doing. Pinned above the composer, ~a third of the view.
       * ================================================================ */
      /* Split row = mic console (left) + results (right), side by side. */
      .split-row { flex: 1; min-height: 0; display: flex; flex-direction: row; }
      /* Left column: mic console + composer, 40% of the row width. */
      .top-stage { flex: 4 1 0; min-width: 0; min-height: 0; display: flex; flex-direction: column; background: #fff; border-right: 1px solid var(--divider); box-shadow: 6px 0 22px rgba(22,31,91,0.05); }
      .console { flex: 1; min-height: 0; overflow-y: auto; background: #fff; padding: 28px 24px; display: flex; align-items: flex-start; }
      /* Right column: results (scrolls) on top, manual-question composer pinned at the bottom. */
      .right-col { flex: 6 1 0; min-width: 0; min-height: 0; display: flex; flex-direction: column; }
      .console-inner { max-width: 560px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 22px; }

      /* Status title, sits right above the mic and reflects what Sage is doing. */
      .cl-status { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; color: var(--n500); transition: color 0.2s; }
      .console.stage-listening .cl-status { color: var(--primary); }
      .console.stage-analyzing .cl-status { color: #B45309; }
      .console.stage-researching .cl-status { color: #047857; }
      .console.stage-speaking .cl-status { color: var(--navy-deep); }

      .console-orb { display: flex; flex-direction: column; align-items: center; gap: 13px; flex-shrink: 0; }
      .console-orb .orb-wrap { margin-bottom: 0; }
      .console-orb-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--n500); transition: color 0.2s; }
      .console.stage-listening .console-orb-label { color: var(--primary); }
      .console.stage-analyzing .console-orb-label { color: #B45309; }
      .console.stage-researching .console-orb-label { color: #047857; }
      .console.stage-speaking .console-orb-label { color: var(--navy-deep); }

      .console-live { flex: 1; min-width: 0; display: flex; flex-direction: column; }
      .cl-stage { display: flex; align-items: center; gap: 13px; }
      .cl-stage-ic { width: 42px; height: 42px; border-radius: 12px; display: grid; place-items: center; flex-shrink: 0; background: var(--n100); color: var(--n500); transition: background 0.2s, color 0.2s; }
      .console.stage-listening .cl-stage-ic { background: var(--quote); color: var(--primary); }

      .cl-stage-label { font-size: 16.5px; font-weight: 700; color: var(--navy-deep); letter-spacing: -0.01em; line-height: 1.25; }
      .cl-stage-sub { font-size: 12px; color: var(--n500); line-height: 1.3; margin-top: 1px; }
      .cl-stats { margin-left: auto; flex-shrink: 0; font-size: 11.5px; font-weight: 700; color: var(--n600); background: var(--n100); padding: 5px 13px; border-radius: 999px; white-space: nowrap; }
      .cl-stats.busy { color: var(--primary); background: var(--quote); }

      .cl-transcript { margin-top: 0; width: 100%; text-align: center; font-size: 22px; font-weight: 500; line-height: 1.45; color: var(--navy-deep); letter-spacing: -0.01em; min-height: 60px; max-height: 168px; overflow-y: auto; overflow-x: hidden; text-wrap: pretty; overflow-wrap: break-word; word-break: break-word; }
      .cl-transcript.cl-tr-muted { font-size: 15px; font-weight: 500; color: var(--n400); }
      .cl-transcript .interim-caret { font-size: 0.7em; }
      .console.stage-analyzing .cl-transcript, .console.stage-researching .cl-transcript { font-size: 18px; }
      /* Teleprompter format for live voice-to-text: text flows top-to-bottom and
         wraps within the column (never sideways), with a taller window and a
         smaller font so more of a long transcript stays on screen at once. The
         newest words are kept in view by auto-scrolling (see patchLiveTranscript). */

      .cl-prompt { margin: 14px 0 0; font-size: 14.5px; line-height: 1.6; color: var(--gray); max-width: 56ch; text-wrap: pretty; }
      .cl-desktop { margin-top: 10px; font-size: 11px; font-weight: 600; color: var(--n500); display: inline-flex; align-items: center; gap: 6px; }
      .cl-desktop.on { color: var(--primary); }
      .cl-foot { margin-top: 12px; }
      .cl-foot .ls-nearmiss { max-width: 100%; }

      /* ===== Responsive ===== */
      @media (max-width: 1023px) {

        /* Anchor the stack to the top (not centered) so the title + transcript

        .console { padding: 14px 14px; align-items: flex-start; }
        .console-inner { gap: 12px; }
        .cl-status { font-size: 17px; }
        .console-orb .orb-wrap { width: 84px; height: 84px; }
        .console-orb .voice-orb { width: 68px; height: 68px; }
        .console-orb-label { display: none; }
        .cl-transcript { font-size: 18px; min-height: 36px; }
        .console.stage-analyzing .cl-transcript, .console.stage-researching .cl-transcript { font-size: 15.5px; }
        .cl-transcript.ac-live { font-size: 15.5px; max-height: 200px; }
        .cl-stage-label { font-size: 14.5px; }
        .sidebar { position: fixed; inset: 0 auto 0 0; z-index: 60; transform: translateX(-100%); transition: transform 0.22s var(--ease); box-shadow: var(--shadow-hover); width: min(320px, 86vw); }
        .sidebar.open { transform: translateX(0); }

        .msg-wrap, .popout-answer { max-width: 92%; }
        .settings-grid { grid-template-columns: 1fr; }

      }
      @media (pointer: coarse) {

        .icon-btn { min-width: 44px; min-height: 44px; }
        .vp { height: 44px; }
        .msg-copy, .popout-copy { opacity: 1; min-width: 32px; min-height: 32px; padding: 6px; }
        .tts-btn { padding: 10px; min-width: 44px; min-height: 44px; bottom: 0; right: 0; }
        .sb-item-actions { opacity: 1; }
        .sb-item-actions button { min-width: 34px; min-height: 34px; }
        .voice-switch { width: 52px; height: 30px; }
        .voice-switch::after { width: 26px; height: 26px; }

        .orb-wrap .orb-ring { display: none; }
        .ac-scrim, .ac-modal { animation: none !important; }
        .ac-seg-thumb { transition: none !important; }
      }

    <script>
      'use strict';

      /* ================================================================

      // Topic detection: in-scope keywords that mark a SailPoint / identity-

      const DEFAULT_VOICE_PERSONALITY = "Your reply will be spoken aloud, so write it the way you'd actually say it. Keep it to 2-3 short sentences. Use contractions and everyday phrasing, and vary the sentence length — flat, uniform sentences sound robotic. An occasional natural lead-in is good ('Yeah, so...', 'Honestly,', 'Short answer —') but never a compliment about the question. Say numbers the way people talk — '120 grand', 'about a third', 'a couple hundred'. No markdown, no lists, no formatting of any kind. Warm, direct, like a colleague answering across the desk.";

      // Classifier gate for overheard utterances.
      //
      // The gate looks for a technical INFORMATION NEED, not just a grammatical
      // question. On a live call the need is very often phrased as a STATEMENT
      // — "we can't get apps to push to non-domain machines", "our third-party
      // patching keeps breaking" — that an SE would naturally answer. Those
      // count. Pure facts with no implied ask ("we run Okta") and chatter do
      // not. The classifier also rewrites the utterance into the explicit
      // question Sage should research, which repairs garble, paraphrase, and
      // follow-up references in the same call.
      // Classifier gate for overheard utterances. Sourced from BRAND.classifierText.
      const CLASSIFIER_SYSTEM = BRAND.classifierText;

      // JSON schema enforced via structured outputs — the classifier reply is
      // guaranteed to parse. (Numeric ranges go in descriptions; the API's
      // schema subset doesn't allow minimum/maximum.)
      const CLASSIFIER_SCHEMA = {
        type: 'object',
        properties: {
          needs_answer:        { type: 'boolean', description: 'True only if the latest utterance is an in-scope technical information need (question OR a statement implying one) Sage should answer now.' },

          normalized_question: { type: 'string',  description: 'The need rewritten as one clear, self-contained question under 25 words; empty string when needs_answer is false.' },
          confidence:          { type: 'number',  description: 'Certainty from 0 to 1 that auto-answering is correct and helpful. Below 0.45 means do not act.' },
          topic:               { type: 'string',  description: 'Two-to-four word topic, e.g. "access certification campaign".' },
          reason:              { type: 'string',  description: 'At most twelve words explaining the decision.' }
        },
        required: ['needs_answer', 'is_question', 'in_scope', 'normalized_question', 'confidence', 'topic', 'reason'],
        additionalProperties: false
      };

      // Safety net when the classifier service is unreachable: obvious
      // technical questions still get answered.
      const TECH_TOPIC_RE = BRAND.productTopics.topicRe;
      const QUESTIONISH_RE = /\?|\b(how|what|why|when|where|which|who|can|could|does|do(?:es)?n.?t|did|is|are|will|would|should)\b[\s\S]{3,}|^(walk me through|tell me|explain|show me)/i;
      // Statement-form technical needs: a problem/goal/pain marker near an
      // in-scope topic ("we keep struggling with access certifications", "no
      // clean way to give users self-service"). Used only by the classifier-down
      // fallback, so a loose match can never auto-answer on its own — it just
      // keeps the SE useful while the LLM gate is unreachable.
      const NEED_MARKER_RE = /\b(struggl(?:e|ing)|trouble|issue|issues|problem|problems|pain|painful|challeng(?:e|ing)|broke(?:n)?|break(?:s|ing)?|fail(?:s|ing|ed)?|can.?t|cannot|can not|unable|no (?:clean |good |easy )?way|hard to|difficult|messy|a mess|need(?:s|ed)? to|trying to|want to|wish (?:we|i)|looking (?:for|to)|figure out|deal with)\b/i;
      function looksLikeTechQuestion(t) {
        return TECH_TOPIC_RE.test(t) && (QUESTIONISH_RE.test(t) || NEED_MARKER_RE.test(t));
      }

      // Tight question shapes for the fast path: clearly-formed technical
      // questions skip the classifier round-trip entirely. Looser shapes
      // still go through the classifier.
      const INSTANT_QUESTION_RE = /^(how|what|why|when|where|which|who|can|could|does|do|did|is|are|will|would|should|tell me|walk me through|explain|show me)\b|\b(how (do|does|did|can|could|would|will)|what (is|are|about|does|happens)|can (it|you|we|they)|does (it|that|this)|is there|are there)\b/i;

        return TECH_TOPIC_RE.test(t) && INSTANT_QUESTION_RE.test(t);
      }

      // call even when they name an in-scope product ("what's Identity Security
      // Cloud cost per identity?"). These bypass the no-classifier fast path
      // and fall through to the classifier, which already treats pricing,
      // contracts, and scheduling as out of scope. The guard only ever ADDS a
      // classifier round-trip — it never drops a question on its own.
      const OUT_OF_SCOPE_RE = /\bhow much (?:do(?:es)?|is|are|would|will)\b|\b(pric(?:e|ing|ed)|quote|discount|per[\s-]?(?:seat|device|user)|license(?:s|ing)? (?:cost|fee|price|pricing)|renewal|contract|invoice|proposal|budget|sales ?rep|account (?:manager|exec))\b/i;

      // Speech-to-text product/term garble fixes. Sourced from BRAND.speechFixes.
      // Applied to overheard utterances before they're classified, answered, and
      // logged, so the assistant reasons over the real product/term names. A
      // wrong guess can only ever route to the classifier (the raw text still
      // feeds the fast path) — it can never auto-answer on its own.
      const TRANSCRIPT_FIXES = BRAND.speechFixes;
      function correctTranscript(text) {
        let t = String(text || '');
        for (const [re, sub] of TRANSCRIPT_FIXES) t = t.replace(re, sub);
        return t.replace(/\s+/g, ' ').trim();
      }

      // Voice turns attach the (slower) web_search tool only when the prompt
      // clearly benefits from live data or product facts.
      const WEB_SEARCH_HINT_RE = BRAND.productTopics.searchHintRe;

      /* ================================================================
       * ENDPOINT + STORAGE KEYS
       * ================================================================ */

      // Apps Script proxy URL. The proxy holds the Anthropic API key, forwards
      // chat requests to Anthropic, and auto-appends each Q&A to the activity
      // log tab. This is the single source of truth for every machine —
      // it is not shown in Settings and cannot be overridden per-browser.
      // NOTE: this is the ORIGINAL deployment's proxy. Re-point it at your own
      // Apps Script deployment before going live, then update this constant.
      const GSHEET_WEBHOOK = 'https://script.google.com/macros/s/AKfycbxVbQD6QplZuNlr51IbbMEG4hPr6nW21K20sATktclGrwZLdgfilgGetRRldFC7e5yt/exec';

      // Optional streaming answer proxy (see STREAMING.md + worker.js). When set
      // to a deployed edge-function URL (Cloudflare Worker / Vercel Edge / Deno),
      // the overheard-question answer streams token-by-token: text fills the
      // panel as it's written and the spoken summary is read aloud sentence-by-
      // sentence as it arrives, instead of waiting for the whole reply. EMPTY by
      // default → the app behaves exactly as before (one Apps Script round trip),
      // and any streaming error falls back to that same path. The classifier,
      // the background Sheet save, and history all stay on Apps Script.
      // Empty by default. Deploy your own streaming edge-function and put its
      // URL here to enable token-by-token answers; otherwise the Apps Script
      // path is used (see handoff notes).
      const STREAM_WEBHOOK = '';

      // Q&As are grouped into conversations by session id. "New chat" rotates
      // it, so the next questions land in a fresh History entry.
      function genSessionId() {
        return 'S-' + Date.now().toString(36) + Math.random().toString(36).substring(2, 6);
      }
      let SESSION_ID = genSessionId();

      const SETTINGS_KEY = BRAND.storageNamespace + '_chatbot_settings';
      // Legacy key from when history was cached on disk. Never written
      // anymore — kept only so startup can clear stale data from old builds.
      const HISTORY_KEY  = BRAND.storageNamespace + '_chat_history';

      /* ================================================================
       * STATE
       * ================================================================ */

      function makeSlot() {
        return {
          label: BRAND.displayName,
          prompt: PERSONA,              // editable persona core (Settings)
          messages: [],                 // {role, content, kind?, spoken?, sources?}
          inputText: '',
          loading: false,
          // The one big switch. When on, the assistant passively hears the
          // microphone and the computer's sound together and answers every
          // technical question it overhears in the chat — no wake word. Always
          // starts off; turning it on needs a click (mic permission requires one).
          listenOn: false,
          // How the assistant captures audio when switched on. Chosen from the
          // "How should it listen?" slider each time it's turned on; the
          // last choice is remembered.
          //   'two-way' — microphone + the computer's own audio. The
          //               screen/tab-share picker pops out so the call is
          //               captured digitally, and the mic runs with echo
          //               cancellation OFF so it overhears the speakers too.
          //   'one-way' — microphone only, with echo cancellation / noise
          //               suppression / auto-gain ON so it picks up the
          //               user's own voice and NOT the call audio coming
          //               from the speakers. No picker pops out.
          audioMode: 'two-way',
          voiceName: BRAND.displayName,
          voicePersonality: DEFAULT_VOICE_PERSONALITY,
          isListening: false,
          isSpeaking: false,
          abortController: null,        // abort the in-flight proxy fetch
          ttsQueue: null,               // FIFO of sentence TTS utterances
          speakAnswers: false,          // read answers out loud
          allowedDomains: DEFAULT_RESEARCH_DOMAINS.slice()
        };
      }

      // Settings is gated behind this password (asked once per page load).
      // Note: this is a soft lock against casual clicks, not real security —
      // anyone reading the page source can see it.
      const SETTINGS_PASSWORD = BRAND.settingsPassword;

      const STATE = {
        activeTab: 'home',
        expandedSlot: null,
        editingSlot: 0,
        historyOpen: false,
        historyConfirmDeleteId: null,
        historyQuery: '',
        // This visit's archived conversations, newest first. MEMORY ONLY by
        // design: any refresh or tab close wipes it, so visitors never see
        // each other's chats. (Q&As still log silently to the sheet.)
        sessionHistory: [],
        composerExpanded: false,
        cardMenuOpen: false,
        // The "How should Sage listen?" chooser shown when turning Sage on.
        audioChooserOpen: false,
        settingsUnlocked: false,
        slots: [makeSlot()]
      };

      let HISTORY_VIEW = { open: null };

      // Floating pop-out chat (Chrome's Document Picture-in-Picture).
      // The pop-out gets its own compact DOM built from STATE — nothing is
      // ever moved out of #app, since render() rebuilds #app's innerHTML
      // constantly and would orphan any adopted nodes.
      const PIP = {
        supported: 'documentPictureInPicture' in window,
        window: null,     // the open PiP window, or null
        slotIdx: null,    // slot the pop-out is pinned to
        opening: false,   // requestWindow() in flight — ignore re-clicks
        lastHtml: '',     // last message-list HTML, to skip no-op rebuilds
        collapsed: false, // minimized to the floating blue "R" icon
        swapping: false,  // mid window-swap — ignore the doomed pagehide
        restoreSize: null,// window size to bring back on expand
        unseen: 0,        // answers that landed while collapsed (badge count)
        flashNext: false, // auto-expanded mid-answer — flash the reply when it lands
        flashNow: false   // flash the newest answer on the next message rebuild
      };

      const VOICE = {
        srSupported: !!(window.SpeechRecognition || window.webkitSpeechRecognition),
        ttsSupported: !!window.speechSynthesis,
        recognition: null,        // shared SpeechRecognition instance
        wantRunning: false,       // should the recognizer be running?
        permissionDenied: false,
        toastTimeoutId: null,
        toastMessage: '',
        playingMsg: null,         // {slot, msg} of the message currently being spoken
        interimText: '',          // live partial transcript
        interimSlot: null,
        interimAt: 0,             // when the interim transcript last changed
        lastTtsEndAt: 0,          // for the post-playback echo grace window
        ttsPaused: false,         // legacy guard flag; always false now (no TTS pause)
        recentTtsText: '',        // rolling buffer of spoken text for echo matching
        srRunning: false,         // recognizer actually running (onstart..onend)
        watchdogId: null,         // background-tab restart watchdog interval
        lastSrEventAt: 0,         // last recognizer activity (wedge detection)
        micStream: null,          // held open (echo cancellation OFF) so the
                                  // mic hears the computer's speakers — see
                                  // startListening()
        // Push-to-talk dictation in the pop-out composer. A SEPARATE
        // recognizer from the passive one above: the Web Speech API only
        // runs one recognizer at a time, so while dictation is live the
        // passive recognizer is paused (dictationPaused) and resumed when
        // dictation ends — see startDictation()/stopDictation().
        dictation: null,          // dedicated dictation SpeechRecognition
        dictating: false,         // dictation actively capturing the mic
        dictationPaused: false,   // passive recognizer paused for dictation
        dictationBase: ''         // finalized dictation text staged in the input
      };

      // Listening runtime state. Sage hears on two channels: (1) the
      // microphone via the Web Speech recognizer — which also overhears the
      // call on the speakers, but only with echo cancellation / noise
      // suppression / auto-gain disabled (see startListening), and only when
      // the user isn't on headphones; and (2) the computer's audio captured
      // digitally through the share picker and transcribed locally by an
      // in-browser Whisper model (see DESKTOP / startDesktopCapture), which
      // works on headphones too. Both channels feed the same pipeline below.
      const TECH = {
        lastErrorToastAt: 0,      // throttle pipeline-failure toasts
        buffer: '',               // join buffer for ASR fragments
        bufferTimerId: null,
        deferrals: 0,
        pending: false,           // classifier call in flight
        pendingSince: 0,          // when the classifier gate started (wedge detection)
        answerSince: 0,           // when the current overheard answer started (wedge detection)
        classifyController: null, // aborts a wedged classifier round-trip
        classifyGen: 0,           // epoch — a stale classify resolution is ignored
        watchdogId: null,         // self-healing pipeline watchdog interval
        activeText: '',           // utterance currently being analyzed/answered (for the live band)
        questionQueue: [],        // FIFO of questions overheard while Sage was busy
        context: [],              // recent utterances for the classifier
        lastSubmitted: '',
        lastSubmittedAt: 0,
        decisions: [],            // ring buffer {text, accepted, confidence, topic, ts}
        recentPairs: [],          // last assist Q&As — API context that survives chat archiving
        heard: 0,
        answered: 0,
        perf: null                // active latency timeline for the question being answered (instrumentation)
      };

      function listeningOn() { return STATE.slots[0].listenOn; }

      // Desktop/computer-audio capture + fully in-browser transcription.
      //
      // The mic path above can only hear computer sound acoustically (the mic
      // overhearing the speakers), which fails the moment the user wears
      // headphones. This path taps the computer's audio DIGITALLY via the
      // screen/tab-share picker (getDisplayMedia) and transcribes it with a
      // Whisper model that runs locally in the browser (WebGPU, WASM
      // fallback) — no audio ever leaves the machine, no API key, and it
      // works identically on speakers or headphones. Its transcripts feed the
      // exact same answer pipeline the microphone uses (handleVoiceTranscript
      // / updateInterim). Optional: if the user dismisses the picker, Sage
      // falls back to mic-only just like before.
      const DESKTOP = {
        supported: !!(navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia &&
                      typeof Worker !== 'undefined' && typeof AudioContext !== 'undefined'),
        on: false,                // is digital computer-audio capture running?
        stream: null,             // getDisplayMedia stream (audio + a stopped video track)
        audioCtx: null,           // 16 kHz context that feeds the transcriber
        sourceNode: null,
        procNode: null,           // ScriptProcessor pulling raw PCM
        worker: null,             // Whisper inference worker (Blob module)
        workerReady: false,
        modelLoading: false,
        device: '',               // 'webgpu' | 'wasm' once known
        statusText: '',           // shown in the live strip
        // Voice-activity segmentation over the incoming PCM.
        seg: [],                  // Float32 chunks of the current utterance
        segLen: 0,                // samples buffered in seg
        speaking: false,
        silenceRun: 0,            // consecutive silent samples
        voicedRun: 0,             // consecutive voiced samples in the open segment
        noiseFloor: 0.002,        // adaptive ambient-noise estimate (EMA while idle)
        preRoll: [],              // ring of recent silent frames (onset pre-roll)
        preRollLen: 0,            // samples buffered in preRoll
        reqId: 0,                 // monotonic id for inference requests
        inFlight: 0,              // outstanding worker jobs (single-flight gate)
        lastInterimAt: 0          // throttle for live partial transcriptions
      };

      // Whisper sample rate, plus VAD/segmentation tuning. Chosen so a normal
      // spoken question finalizes ~0.7 s after the speaker stops, while a long
      // monologue still flushes periodically instead of growing unbounded.
      //
      // Voice activity uses an ADAPTIVE dual-threshold detector (see
      // processDesktopBlock): a noise floor is tracked while the line is quiet
      // and the open/close thresholds ride a little above it. In a silent room
      // the open threshold stays pinned to SILENCE_RMS (so behaviour matches the
      // old fixed detector), but in a noisy room — fans, HVAC, a hot mic on the
      // call — the bar rises so steady background hum no longer trips Whisper
      // into transcribing (and hallucinating over) non-speech. The lower close
      // threshold adds hysteresis so a brief dip mid-word doesn't split one
      // sentence into two, and a short pre-roll keeps the audio just BEFORE the
      // onset so the first word isn't clipped (Whisper mis-reads clipped onsets).
      const ASR = {
        SAMPLE_RATE: 16000,
        SILENCE_RMS: 0.006,       // absolute floor for the OPEN threshold (quiet-room default)
        CLOSE_FLOOR: 0.004,       // absolute floor for the CLOSE threshold (< open ⇒ hysteresis)
        NOISE_OPEN_FACTOR: 1.8,   // open a segment when rms ≥ noiseFloor × this
        NOISE_CLOSE_FACTOR: 1.3,  // keep it open while rms ≥ noiseFloor × this
        NOISE_FLOOR_MAX: 0.012,   // clamp so loud rooms can't raise the bar past real speech
        NOISE_FLOOR_INIT: 0.002,  // starting noise estimate before any audio arrives
        PREROLL_MS: 300,          // audio kept before the onset so the first word survives
        SILENCE_MS: 700,          // trailing silence that ends an utterance
        MIN_VOICED_MS: 250,       // ignore blips shorter than this
        MAX_SEG_MS: 18000,        // hard flush so long talk still transcribes live
        INTERIM_MS: 1400,         // how often to refresh the live partial
        MAX_TAIL_S: 24            // cap the audio sent per inference (seconds)
      };

      /* ================================================================
       * SETTINGS PERSISTENCE
       * ================================================================ */

      function saveSettings() {
        const data = STATE.slots.map(s => ({
          label: s.label,
          prompt: s.prompt,
          voiceName: s.voiceName,
          voicePersonality: s.voicePersonality,
          speakAnswers: !!s.speakAnswers,
          audioMode: s.audioMode === 'one-way' ? 'one-way' : 'two-way',
          allowedDomains: s.allowedDomains
        }));
        try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(data)); } catch {}
      }

      // A returning user from the prior brand has that brand's persona cached.
      // hasLegacyBrand() flags any stored prompt still carrying a prior-brand
      // name or product, so we can refresh it to the current PERSONA — without
      // clobbering anyone who genuinely customized their own prompt.

      function loadSettings() {
        try {
          const raw = localStorage.getItem(SETTINGS_KEY);
          if (!raw) return;
          const data = JSON.parse(raw);
          data.forEach((d, i) => {
            const s = STATE.slots[i];
            if (!s) return;
            // Drop a stale prior-brand default label (e.g. the old "<brand> SE")
            // so returning users pick up the current default instead.
            s.label = (d.label && d.label !== LEGACY.defaultLabel && !hasLegacyBrand(d.label)) ? d.label : s.label;
            const storedPrompt = d.prompt || '';
            const isLegacyDefault = storedPrompt && hasLegacyBrand(storedPrompt);
            s.prompt = (isLegacyDefault ? '' : storedPrompt) || s.prompt;
            // A cached voice name carrying the old brand falls back to the label.
            s.voiceName = (d.voiceName && !hasLegacyBrand(d.voiceName)) ? d.voiceName : s.label;
            s.voicePersonality = d.voicePersonality || DEFAULT_VOICE_PERSONALITY;
            // speakAnswers (migrating the older speakResponses key)
            s.speakAnswers = !!(d.speakAnswers !== undefined ? d.speakAnswers : d.speakResponses);
            if (d.audioMode === 'one-way' || d.audioMode === 'two-way') s.audioMode = d.audioMode;
            if (Array.isArray(d.allowedDomains)) {
              // Keep the user's saved list but strip any prior-brand support /
              // ecosystem domains; if that empties it, restore the defaults.
              const cleaned = scrubLegacyDomains(
                d.allowedDomains.filter(x => typeof x === 'string' && x.trim()).map(x => x.trim())
              );
              s.allowedDomains = cleaned.length ? cleaned : DEFAULT_RESEARCH_DOMAINS.slice();
            }
          });
        } catch {}
        // Listening always starts OFF — the screen-share picker needs a click.
        // The proxy URL used to be overridable per-browser, which left some
        // machines pointing at dead deployments. Drop any saved override (both
        // the prior-brand key and the current namespace) so every computer uses
        // the hardcoded GSHEET_WEBHOOK.
        try {
          if (LEGACY.gsheetKey) localStorage.removeItem(LEGACY.gsheetKey);
          localStorage.removeItem(BRAND.storageNamespace + '_gsheet_url');
        } catch {}
      }

      /* ================================================================
       * HISTORY (memory-only, this visit only)
       *
       * STATE.sessionHistory is the sole source for the side panel. Nothing
       * is ever fetched back from the sheet and nothing is persisted to
       * disk, so each device/session only ever sees its own conversations
       * and a refresh or tab close starts clean. Q&As still flow UP to the
       * sheet (postChat / postSaveToSheet) as a silent per-session log.
       * ================================================================ */

      // One-time cleanup: older builds cached synced history on disk under
      // HISTORY_KEY. Clear it so returning devices don't keep stale chats.
      try { localStorage.removeItem(HISTORY_KEY); } catch {}

      // Assist answers must open with "**Short answer:**". Models occasionally
      // ad-lib a fake-out first ("Great question! ... Just kidding. Here's
      // the real answer:"). Two passes, both anchored so they can't damage
      // a genuine answer: peel known opener patterns off the start, then if
      // the bolded Short-answer marker still sits past the start, cut to it.
      function sanitizeAssistAnswer(text) {
        let t = String(text || '').trim();
        let prev;
        do {
          prev = t;
          t = t
            .replace(/^\**(?:great|good|excellent|awesome|fantastic) question\b[.!…:]*\**\s*/i, '')
            .replace(/^let me (?:explain|walk you through|break (?:this|that|it) down)\b[^\n.!?]*[.!?…]*\s*/i, '')
            .replace(/^just kidding\b[.!,…]*\s*/i, '')
            .replace(/^(?:here'?s|now for) the (?:real|actual|serious) answer[.!:]*\s*/i, '')
            .trim();
        } while (t !== prev);
        const m = t.match(/\*\*\s*short\s+answer\s*:?\s*\*\*/i);
        if (m && m.index > 0 && m.index < 200) t = t.slice(m.index).trim();
        return t || String(text || '').trim();
      }

      function entryMs(entry) {
        let ts = Number(entry && entry.timestamp) || 0;
        if (!ts && entry && entry.date) {
          const parsed = Date.parse(entry.date);
          if (!isNaN(parsed)) ts = parsed;
        }
        return ts;
      }

      function formatHistoryDate(entry) {
        const ts = entryMs(entry);
        if (!ts) return entry && entry.date ? String(entry.date) : '';
        const d = new Date(ts);
        const now = new Date();
        const sod = x => new Date(x.getFullYear(), x.getMonth(), x.getDate()).getTime();
        const diff = Math.round((sod(now) - sod(d)) / 86400000);
        const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        if (diff === 0) return 'Today, ' + time;
        if (diff === 1) return 'Yesterday, ' + time;
        if (diff > 1 && diff < 7) return d.toLocaleDateString([], { weekday: 'short' }) + ', ' + time;
        if (d.getFullYear() === now.getFullYear()) return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
        return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
      }

      // Compact stamp for the list items: the group header already says
      // "Today"/"Yesterday", so inside those buckets the time alone is enough.
      function formatHistoryTime(entry) {
        const ts = entryMs(entry);
        if (!ts) return entry && entry.date ? String(entry.date) : '';
        const d = new Date(ts);
        const now = new Date();
        const sod = x => new Date(x.getFullYear(), x.getMonth(), x.getDate()).getTime();
        const diff = Math.round((sod(now) - sod(d)) / 86400000);
        const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        if (diff <= 1) return time;
        if (diff < 7) return d.toLocaleDateString([], { weekday: 'short' }) + ', ' + time;
        if (d.getFullYear() === now.getFullYear()) return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
        return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
      }

      function filterHistory(history, query) {
        const q = String(query || '').trim().toLowerCase();
        if (!q) return history;
        return history.filter(h =>
          (h.preview || '').toLowerCase().includes(q) ||
          h.pairs.some(p =>
            p.question.toLowerCase().includes(q) ||
            p.answer.toLowerCase().includes(q)));
      }

      function historyBucket(entry) {
        const ts = entryMs(entry);
        if (!ts) return 'Earlier';
        const d = new Date(ts);
        const now = new Date();
        const sod = x => new Date(x.getFullYear(), x.getMonth(), x.getDate()).getTime();
        const diff = Math.round((sod(now) - sod(d)) / 86400000);
        if (diff <= 0) return 'Today';
        if (diff === 1) return 'Yesterday';
        if (diff < 7) return 'Earlier this week';
        if (diff < 30) return 'Earlier this month';
        if (d.getFullYear() === now.getFullYear()) return 'Earlier this year';
        return 'Older';
      }

      const HISTORY_BUCKET_ORDER = ['Today', 'Yesterday', 'Earlier this week', 'Earlier this month', 'Earlier this year', 'Older'];

      function groupHistoryByBucket(history) {
        const groups = {};
        for (const h of history) {
          const k = historyBucket(h);
          (groups[k] = groups[k] || []).push(h);
        }
        return HISTORY_BUCKET_ORDER
          .filter(k => groups[k] && groups[k].length)
          .map(k => ({ label: k, items: groups[k] }));
      }

      // Newest first; capped so a marathon visit can't grow memory unbounded.
      function addSessionHistoryEntry(entry) {
        STATE.sessionHistory.unshift(entry);
        if (STATE.sessionHistory.length > 50) STATE.sessionHistory.length = 50;
      }

      function collectPairs(slot) {
        const pairs = [];
        for (let i = 0; i < slot.messages.length - 1; i++) {
          const m = slot.messages[i];
          const next = slot.messages[i + 1];
          if (m.role === 'user' && next && next.role === 'assistant' && next.content) {
            pairs.push({ question: String(m.content || ''), answer: String(next.content || '') });
          }
        }
        return pairs;
      }

      // Tuck the current conversation into this visit's History panel and
      // reset the chat to empty. The sheet already has every answered Q&A
      // (the client saves each one in the background), so nothing is lost.
      // Rotating the session id keeps the sheet's grouping in step with the
      // local entry. Returns true when something was actually archived.
      function archiveChatToHistory(slot) {
        const pairs = collectPairs(slot);
        if (!pairs.length) return false;
        const ts = Date.now();
        addSessionHistoryEntry({
          id: SESSION_ID + '-' + ts,
          session_id: SESSION_ID,
          date: new Date(ts).toLocaleDateString('en-US'),
          timestamp: ts,
          pairs,
          preview: pairs[0].question.substring(0, 120)
        });
        slot.messages = [];
        SESSION_ID = genSessionId();
        return true;
      }

      // "New chat": archive and start fresh.
      function newChat() {
        const slot = STATE.slots[0];
        if (slot.abortController) { try { slot.abortController.abort(); } catch {} slot.abortController = null; }
        teardownTtsQueue(0);
        if (slot.isSpeaking) stopSpeaking();
        abortActiveReply();   // cancel any in-flight reply and stop any audio
        slot.loading = false;
        const archived = archiveChatToHistory(slot);
        if (!archived) {
          slot.messages = [];
          SESSION_ID = genSessionId();
        }
        slot.inputText = '';
        showToast(archived ? 'New chat — the old one is saved in History' : 'New chat');
        render();
      }

      // Local-only: removes the entry from this visit's panel. The sheet log
      // is an untouched audit record — no delete request is ever sent.
      function deleteHistoryEntry(id) {
        STATE.sessionHistory = STATE.sessionHistory.filter(h => h.id !== id);
      }

      /* ================================================================
       * PROXY HEALTH
       * ================================================================ */

      const PROXY = { ready: false, hasKey: false, error: null };

      async function loadRemoteConfig() {
        if (!GSHEET_WEBHOOK) return;
        try {
          const resp = await fetch(GSHEET_WEBHOOK + (GSHEET_WEBHOOK.includes('?') ? '&' : '?') + 'action=ping');
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          const info = await resp.json();
          PROXY.ready = !!info.ok;
          PROXY.hasKey = !!info.has_api_key;
          PROXY.error = info.ok ? null : (info.error || 'Proxy returned an error');
        } catch (err) {
          PROXY.ready = false;
          PROXY.error = err && err.message ? err.message : 'Proxy unreachable';
          console.warn('Proxy ping failed:', err);
        }
      }

      // Keep the Apps Script proxy warm while Sage is listening. Apps Script
      // spins its instance down after a few idle minutes; the next request then
      // pays a 0.5–2 s cold start — and on a live call that tax lands on the
      // FIRST overheard question, exactly when it's most noticeable. A cheap
      // periodic GET to the lightweight ping endpoint keeps the instance warm so
      // the first real answer doesn't eat it. Fire-and-forget: it never mutates
      // PROXY readiness state, so a transient blip can't flip the UI.
      let proxyWarmId = null;
      function pingProxyWarm() {
        if (!GSHEET_WEBHOOK) return;
        const url = GSHEET_WEBHOOK + (GSHEET_WEBHOOK.includes('?') ? '&' : '?') + 'action=ping';
        fetch(url, { method: 'GET' }).catch(() => {});
      }
      function startProxyWarmup() {
        if (proxyWarmId || !GSHEET_WEBHOOK) return;
        pingProxyWarm(); // warm immediately, then on a cadence below the spindown window
        proxyWarmId = setInterval(pingProxyWarm, ASSIST.PROXY_WARM_MS);
      }
      function stopProxyWarmup() {
        if (proxyWarmId) { clearInterval(proxyWarmId); proxyWarmId = null; }
      }

      /* ================================================================
       * LATENCY INSTRUMENTATION (overheard question → spoken answer)
       *
       * "You can't shave milliseconds you can't see." Each finalized question
       * gets a timeline; stage durations and the answer call's prompt-cache
       * usage are logged to the console and kept in a small ring buffer at
       * window.__sagePerf for ad-hoc inspection. This is pure measurement — it
       * never changes behaviour, the answer, or the pipeline's control flow.
       *
       * Cache health: the ~2K-token persona/style prefix is wrapped for
       * Anthropic prompt caching (systemBlocks). On a warm call the answer's
       * usage should show cache_read_input_tokens ≫ cache_creation_input_tokens;
       * if reads stay 0 across calls, the cache isn't hitting and the persona is
       * being reprocessed every time (wasted input-processing latency).
       * ================================================================ */
      const PERF = { enabled: true, log: [], KEEP: 20 };
      function perfStart(question) {
        if (!PERF.enabled) return null;
        return { question: truncate(question, 80), t0: performance.now(), marks: {}, cache: {} };
      }
      function perfMark(t, name) {
        if (t && t.marks[name] == null) t.marks[name] = performance.now();
      }
      function perfCache(t, usage, label) {
        if (!t || !usage) return;
        t.cache[label] = {
          read: usage.cache_read_input_tokens || 0,
          created: usage.cache_creation_input_tokens || 0,
          input: usage.input_tokens || 0
        };
      }
      function perfFinish(t, status) {
        if (!t || t._done) return;
        t._done = true;
        const m = t.marks;
        const seg = (a, b) => (m[a] != null && m[b] != null) ? Math.round(m[b] - m[a]) : null;
        const endRef = m.firstAudio != null ? m.firstAudio : (m.answerEnd != null ? m.answerEnd : performance.now());
        const ans = t.cache && t.cache.answer;
        const summary = {
          status: status || 'done',
          total_ms: Math.round(endRef - t.t0),
          classify_ms: seg('classifyStart', 'classifyEnd'),
          answer_ms: seg('answerStart', 'answerEnd'),
          to_first_audio_ms: m.firstAudio != null ? Math.round(m.firstAudio - t.t0) : null,
          cache_hit: ans ? (ans.read > 0) : null,
          cache: t.cache,
          question: t.question
        };
        PERF.log.push(summary);
        while (PERF.log.length > PERF.KEEP) PERF.log.shift();
        try { window.__sagePerf = PERF.log; } catch {}
        const parts = ['[perf] ' + summary.status, 'total=' + summary.total_ms + 'ms'];
        if (summary.classify_ms != null) parts.push('classify=' + summary.classify_ms + 'ms');
        if (summary.answer_ms != null) parts.push('answer=' + summary.answer_ms + 'ms');
        if (summary.to_first_audio_ms != null) parts.push('→firstAudio=' + summary.to_first_audio_ms + 'ms');
        if (ans) parts.push('cache:read=' + ans.read + '/created=' + ans.created);
        console.info(parts.join(' ') + ' — "' + summary.question + '"');
        if (TECH.perf === t) TECH.perf = null;
      }

      loadSettings();
      try { document.title = BRAND.pageTitle; } catch {}

      /* ================================================================
       * TEXT HELPERS + SAFE MARKDOWN RENDERER
       * ================================================================ */

      function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
      function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }
      function truncate(s, n) {
        s = String(s || '');
        return s.length > n ? s.substring(0, n - 1) + '…' : s;
      }

      // Minimal, safe markdown → HTML for assist answers. All input is
      // HTML-escaped first; only a small whitelist of constructs is then
